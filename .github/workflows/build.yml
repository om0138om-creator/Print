name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. جلب الكود
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. إعداد JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. إعداد Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. توليد Gradle Wrapper تلقائياً ⭐
    - name: Generate Gradle Wrapper
      run: |
        # إنشاء مجلد wrapper
        mkdir -p gradle/wrapper
        
        # تحميل gradle wrapper jar
        curl -Lo gradle/wrapper/gradle-wrapper.jar \
          https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
        
        # إنشاء ملف gradlew
        cat > gradlew << 'GRADLEW'
        #!/bin/bash
        JAVACMD="${JAVA_HOME}/bin/java"
        exec "$JAVACMD" -classpath "$PWD/gradle/wrapper/gradle-wrapper.jar" \
          org.gradle.wrapper.GradleWrapperMain "$@"
        GRADLEW
        
        # منح صلاحية التنفيذ
        chmod +x gradlew

    # 5. بناء Debug APK
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    # 6. بناء Release APK
    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    # 7. رفع Debug APK
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: NetworkPrinter-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    # 8. رفع Release APK
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: NetworkPrinter-Release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
